name: "Query: current deployed version"
type: query
tags: [query, production]

setup:
  environments:
    - name: production
      variables:
        APP_ENV: production

operation:
  type: query
  intent: "What version of the web-app is currently deployed to production?"
  environmentRef: production

assertions:
  - responseStatus: 201
  - statusIn: [pending, planning, awaiting_approval]
