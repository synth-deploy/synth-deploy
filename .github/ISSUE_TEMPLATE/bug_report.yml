name: Bug Report
description: Report a bug in Synth
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure ...
        2. Deploy ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Synth version:
        - Node version:
        - OS:
        - Deployment method (Docker / bare metal):
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or debrief output
      description: Paste any relevant log output or debrief entries. This will be automatically formatted as code.
      render: shell
    validations:
      required: false
