<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1e2028"/>
  <g transform="translate(16,16)">
    <!-- 7 tapered fingerprint lines, right-weighted -->
    <line x1="-9" y1="-5.5" x2="10" y2="-5.5" stroke="#6b8aff" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="-9" y1="-3.3" x2="10" y2="-3.3" stroke="#6b8aff" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <line x1="-9" y1="-1.1" x2="10" y2="-1.1" stroke="#6b8aff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-9" y1="1.1" x2="10" y2="1.1" stroke="#6b8aff" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
    <line x1="-9" y1="3.3" x2="10" y2="3.3" stroke="#6b8aff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-9" y1="5.5" x2="10" y2="5.5" stroke="#6b8aff" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <!-- Endpoint dot -->
    <circle cx="11.5" cy="0" r="1.5" fill="#6b8aff" opacity="0.7"/>
  </g>
</svg>
