services:
  synth-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "9410:9410"
    volumes:
      - synth-data:/data
    environment:
      - NODE_ENV=production
      - SYNTH_DATA_DIR=/data
      - SYNTH_JWT_SECRET=${SYNTH_JWT_SECRET:-}
      - SYNTH_LLM_API_KEY=${SYNTH_LLM_API_KEY:-}
      - SYNTH_LLM_PROVIDER=${SYNTH_LLM_PROVIDER:-anthropic}
      - SYNTH_SEED_DEMO=${SYNTH_SEED_DEMO:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9410/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 1.0

  envoy:
    build:
      context: .
      dockerfile: Dockerfile.envoy
    ports:
      - "9411:9411"
    volumes:
      - envoy-workspace:/workspace
    environment:
      - NODE_ENV=production
      - SYNTH_SERVER_URL=http://synth-server:9410
    depends_on:
      synth-server:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.0

volumes:
  synth-data:
  envoy-workspace:
