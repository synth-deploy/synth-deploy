services:
  command:
    build:
      context: .
      dockerfile: Dockerfile.command
    ports:
      - "3000:3000"
    volumes:
      - synth-data:/data
    environment:
      - NODE_ENV=production
      - SYNTH_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 1.0

  envoy:
    build:
      context: .
      dockerfile: Dockerfile.envoy
    ports:
      - "3001:3001"
    volumes:
      - envoy-workspace:/workspace
    environment:
      - NODE_ENV=production
      - SYNTH_COMMAND_URL=http://command:3000
    depends_on:
      command:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.0

volumes:
  synth-data:
  envoy-workspace:
